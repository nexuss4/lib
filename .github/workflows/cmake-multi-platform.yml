name: Build WASM

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      # ✅ Persist env for ALL steps
      - name: Add Emscripten to PATH
        run: echo "$PWD/emsdk/upstream/emscripten" >> $GITHUB_PATH

      # ✅ Proper configure using emcmake
      - name: Configure
        run: |
          source emsdk/emsdk_env.sh
          emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release

      # ✅ Build
      - name: Build
        run: |
          source emsdk/emsdk_env.sh
          cmake --build build

      # 🔍 Debug output (VERY useful)
      - name: List build output
        run: find build -type f

      # ✅ Upload artifacts
      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: WASM-Emscripten_Release
          path: |
            build/**/*.wasm
            build/**/*.js